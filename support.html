<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Support - Wisata Banten</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body class="animated-bg">

<header>
    <h2>Support & Laporan Kesalahan</h2>
    <p>Bantu kami meningkatkan kualitas website</p>
</header>

<div class="container fade-in">

    <a href="index.html" class="back-link">
        &#8592; Kembali ke Beranda
    </a>

    <form class="support-form" action="#success">

        <label>Nama Anda</label>
        <input type="text" placeholder="Masukkan nama Anda" required>

        <label>Judul Kesalahan / Kritik</label>
        <input type="text" placeholder="Masukkan kesalahan/bug pada website ini" required>

        <label>Deskripsi</label>
        <textarea rows="5" placeholder="Jelaskan kesalahan atau saran Anda..." required></textarea>

        <button type="submit">Kirim Laporan</button>

    </form>

</div>

<footer>
    <p>© 2026 Wisata Banten</p>
</footer>

</body>
</html>
